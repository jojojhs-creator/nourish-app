name: StoryOwl Auto-Post

on:
  repository_dispatch:
    types: [storyowl_video_ready]
  workflow_dispatch:
    inputs:
      video_url:
        description: "Cloudinary MP4 URL of the finished ~60s episode video"
        required: true
        type: string
      thumbnail_url:
        description: "Cloudinary image URL used as the YouTube custom thumbnail (optional)"
        required: false
        type: string
      youtube_title:
        description: "YouTube title (≤100 chars, include #Shorts)"
        required: false
        type: string
      youtube_description:
        description: "YouTube description — a few sentences about the story + moral, include #Shorts"
        required: false
        type: string
      youtube_tags:
        description: "Comma-separated YouTube tags e.g. #BedtimeStory, #KidsStories, #Shorts"
        required: false
        type: string
      tiktok_caption:
        description: "TikTok caption with inline hashtags (≤2200 chars). Pasted manually in DRAFT mode; applied automatically in SELF_ONLY / PUBLIC_TO_EVERYONE."
        required: false
        type: string
      tiktok_post_mode:
        description: "TikTok posting mode. DRAFT = creator inbox (manual finish); SELF_ONLY = private direct post; PUBLIC_TO_EVERYONE = public (requires Content Posting API approval). Overrides the TIKTOK_POST_MODE repo variable."
        required: false
        type: choice
        default: ""
        options:
          - ""
          - DRAFT
          - SELF_ONLY
          - PUBLIC_TO_EVERYONE

permissions:
  contents: read

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/storyowl/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/storyowl/requirements.txt

      - name: Run StoryOwl autopost orchestrator
        env:
          VIDEO_URL: ${{ github.event.client_payload.video_url || inputs.video_url }}
          THUMBNAIL_URL: ${{ github.event.client_payload.thumbnail_url || inputs.thumbnail_url }}
          YOUTUBE_TITLE: ${{ github.event.client_payload.youtube_title || inputs.youtube_title }}
          YOUTUBE_DESCRIPTION: ${{ github.event.client_payload.youtube_description || inputs.youtube_description }}
          YOUTUBE_TAGS: ${{ github.event.client_payload.youtube_tags || inputs.youtube_tags }}
          TIKTOK_CAPTION: ${{ github.event.client_payload.tiktok_caption || inputs.tiktok_caption }}
          TIKTOK_POST_MODE: ${{ github.event.client_payload.tiktok_post_mode || inputs.tiktok_post_mode || vars.TIKTOK_POST_MODE }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          INCLUDE_VIDEO_IN_ARTIFACT: ${{ vars.INCLUDE_VIDEO_IN_ARTIFACT }}
        run: python scripts/storyowl/orchestrator.py

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storyowl-result-${{ github.run_id }}
          path: out/
          retention-days: 14
