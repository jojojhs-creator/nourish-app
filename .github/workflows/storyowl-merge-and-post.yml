name: Coffee, Cats & Malak Merge and Post

# Downloads 2-4 video clips (+ an optional voice/narration track), merges them with
# ffmpeg into a single clip, then posts to YouTube and TikTok.
#
# Coffee, Cats & Malak scenarios are usually a single 15s clip (post directly via
# storyowl-autopost.yml instead - no merge needed). Use this workflow for 30s scenes
# made of two sequential 15s clips. voice_url/clip3_url/clip4_url are optional and only
# needed for older-style multi-clip narrated content.

on:
  workflow_dispatch:
    inputs:
      clip1_url:
        description: "URL for clip 1"
        required: true
        type: string
      clip2_url:
        description: "URL for clip 2"
        required: true
        type: string
      clip3_url:
        description: "URL for clip 3 (optional - omit for a 2-clip 30s video)"
        required: false
        type: string
      clip4_url:
        description: "URL for clip 4 (optional)"
        required: false
        type: string
      voice_url:
        description: "Optional voiceover/narration track. Omit to keep each clip's own baked-in ambient audio (the default for Coffee, Cats & Malak scenes)."
        required: false
        type: string
      thumbnail_url:
        description: "URL of the post thumbnail image"
        required: false
        type: string
      youtube_title:
        description: "YouTube title"
        required: false
        type: string
      youtube_description:
        description: "YouTube description"
        required: false
        type: string
      youtube_tags:
        description: "Comma-separated YouTube tags"
        required: false
        type: string
      tiktok_caption:
        description: "TikTok caption (with hashtags)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  merge-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/storyowl/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/storyowl/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download clips and optional voice
        env:
          CLIP1_URL: ${{ inputs.clip1_url }}
          CLIP2_URL: ${{ inputs.clip2_url }}
          CLIP3_URL: ${{ inputs.clip3_url }}
          CLIP4_URL: ${{ inputs.clip4_url }}
          VOICE_URL: ${{ inputs.voice_url }}
        run: |
          curl -sL -o clip1.mp4 "$CLIP1_URL"
          curl -sL -o clip2.mp4 "$CLIP2_URL"
          CLIPS="clip1.mp4 clip2.mp4"

          if [ -n "$CLIP3_URL" ]; then
            curl -sL -o clip3.mp4 "$CLIP3_URL"
            CLIPS="$CLIPS clip3.mp4"
          fi
          if [ -n "$CLIP4_URL" ]; then
            curl -sL -o clip4.mp4 "$CLIP4_URL"
            CLIPS="$CLIPS clip4.mp4"
          fi
          if [ -n "$VOICE_URL" ]; then
            curl -sL -o voice_raw "$VOICE_URL"
          fi

          echo "CLIPS=$CLIPS" >> "$GITHUB_ENV"
          ls -lh clip*.mp4

      - name: Merge clips (and overlay voice if provided)
        env:
          VOICE_URL: ${{ inputs.voice_url }}
        run: |
          printf "file '%s'\n" $CLIPS > concat.txt
          cat concat.txt

          if [ -n "$VOICE_URL" ]; then
            # Strip original clip audio, concat, then overlay the voice track as the
            # sole audio (trimmed to video length).
            ffmpeg -f concat -safe 0 -i concat.txt \
              -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
              -c:v libx264 -preset fast -crf 23 \
              -an concatenated.mp4 -y

            ffmpeg -i concatenated.mp4 -i voice_raw \
              -c:v copy -c:a aac -b:a 128k \
              -map 0:v:0 -map 1:a:0 \
              -shortest -y merged.mp4
          else
            # No voice track - keep each clip's own baked-in ambient audio straight
            # through the concat.
            ffmpeg -f concat -safe 0 -i concat.txt \
              -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
              -c:v libx264 -preset fast -crf 23 \
              -c:a aac -b:a 128k \
              -y merged.mp4
          fi

          echo "=== Merged video info ==="
          ls -lh merged.mp4
          ffprobe -v quiet -print_format json -show_format merged.mp4 \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Duration: {float(d[\"format\"][\"duration\"]):.1f}s  Size: {int(d[\"format\"][\"size\"])//1024}KB')"

      - name: Post to YouTube and TikTok
        env:
          VIDEO_FILE: merged.mp4
          THUMBNAIL_URL: ${{ inputs.thumbnail_url }}
          YOUTUBE_TITLE: ${{ inputs.youtube_title }}
          YOUTUBE_DESCRIPTION: ${{ inputs.youtube_description }}
          YOUTUBE_TAGS: ${{ inputs.youtube_tags }}
          TIKTOK_CAPTION: ${{ inputs.tiktok_caption }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_POST_MODE: ${{ vars.TIKTOK_POST_MODE }}
          INCLUDE_VIDEO_IN_ARTIFACT: ${{ vars.INCLUDE_VIDEO_IN_ARTIFACT }}
        run: python scripts/storyowl/orchestrator.py

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coffee-cats-malak-merge-result-${{ github.run_id }}
          path: out/
          retention-days: 14
