name: StoryOwl Merge and Post

# Downloads 4 video clips + a voice track, merges them with ffmpeg into a
# single ~60s episode, then posts to YouTube and TikTok.

on:
  workflow_dispatch:
    inputs:
      clip1_url:
        description: "Cloudinary URL for clip 1 (e.g. https://res.cloudinary.com/.../clip1.mp4)"
        required: true
        type: string
      clip2_url:
        description: "Cloudinary URL for clip 2"
        required: true
        type: string
      clip3_url:
        description: "Cloudinary URL for clip 3"
        required: true
        type: string
      clip4_url:
        description: "Cloudinary URL for clip 4"
        required: true
        type: string
      voice_url:
        description: "Cloudinary URL for the voiceover (any audio format)"
        required: true
        type: string
      thumbnail_url:
        description: "URL of the episode thumbnail image"
        required: false
        type: string
      youtube_title:
        description: "YouTube title"
        required: false
        type: string
      youtube_description:
        description: "YouTube description"
        required: false
        type: string
      youtube_tags:
        description: "Comma-separated YouTube tags"
        required: false
        type: string
      tiktok_caption:
        description: "TikTok caption (with hashtags)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  merge-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/storyowl/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/storyowl/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download clips and voice
        run: |
          curl -sL -o clip1.mp4 "${{ inputs.clip1_url }}"
          curl -sL -o clip2.mp4 "${{ inputs.clip2_url }}"
          curl -sL -o clip3.mp4 "${{ inputs.clip3_url }}"
          curl -sL -o clip4.mp4 "${{ inputs.clip4_url }}"
          curl -sL -o voice_raw "${{ inputs.voice_url }}"
          ls -lh clip*.mp4 voice_raw

      - name: Merge clips and overlay voice with ffmpeg
        run: |
          # Concat list
          printf "file '%s'\n" clip1.mp4 clip2.mp4 clip3.mp4 clip4.mp4 > concat.txt

          # Concatenate clips (re-encode to ensure compatibility, strip audio)
          ffmpeg -f concat -safe 0 -i concat.txt \
            -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
            -c:v libx264 -preset fast -crf 23 \
            -an concatenated.mp4 -y

          # Overlay voice as sole audio track (trim to video length)
          ffmpeg -i concatenated.mp4 -i voice_raw \
            -c:v copy -c:a aac -b:a 128k \
            -map 0:v:0 -map 1:a:0 \
            -shortest -y merged.mp4

          echo "=== Merged video info ==="
          ls -lh merged.mp4
          ffprobe -v quiet -print_format json -show_format merged.mp4 \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'Duration: {float(d[\"format\"][\"duration\"]):.1f}s  Size: {int(d[\"format\"][\"size\"])//1024}KB')"

      - name: Post to YouTube and TikTok
        env:
          VIDEO_FILE: merged.mp4
          THUMBNAIL_URL: ${{ inputs.thumbnail_url }}
          YOUTUBE_TITLE: ${{ inputs.youtube_title }}
          YOUTUBE_DESCRIPTION: ${{ inputs.youtube_description }}
          YOUTUBE_TAGS: ${{ inputs.youtube_tags }}
          TIKTOK_CAPTION: ${{ inputs.tiktok_caption }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_POST_MODE: ${{ vars.TIKTOK_POST_MODE }}
          INCLUDE_VIDEO_IN_ARTIFACT: ${{ vars.INCLUDE_VIDEO_IN_ARTIFACT }}
        run: python scripts/storyowl/orchestrator.py

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storyowl-merge-result-${{ github.run_id }}
          path: out/
          retention-days: 14
