name: TikTok OAuth token exchange (one-time helper)

on:
  workflow_dispatch:
    inputs:
      client_key:
        description: TikTok Client Key
        required: true
      client_secret:
        description: TikTok Client Secret
        required: true
      code:
        description: Authorization code from the redirect URL
        required: true
      redirect_uri:
        description: Redirect URI used in the authorization request
        required: true
        default: https://jojojhs-creator.github.io/nourish-app/

permissions:
  contents: read

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange authorization code for tokens
        env:
          CLIENT_KEY: ${{ inputs.client_key }}
          CLIENT_SECRET: ${{ inputs.client_secret }}
          CODE: ${{ inputs.code }}
          REDIRECT_URI: ${{ inputs.redirect_uri }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          data = urllib.parse.urlencode({
              "client_key": os.environ["CLIENT_KEY"],
              "client_secret": os.environ["CLIENT_SECRET"],
              "code": os.environ["CODE"],
              "grant_type": "authorization_code",
              "redirect_uri": os.environ["REDIRECT_URI"],
          }).encode()

          req = urllib.request.Request(
              "https://open.tiktokapis.com/v2/oauth/token/",
              data=data,
              headers={"Content-Type": "application/x-www-form-urlencoded"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  status = resp.status
                  body = resp.read().decode()
          except urllib.error.HTTPError as e:
              status = e.code
              body = e.read().decode()

          result = json.loads(body)
          refresh_token = result.get("refresh_token", "")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("## TikTok Token Exchange Result\n\n")
              f.write(f"HTTP status: {status}\n\n")
              if refresh_token:
                  f.write(f"**refresh_token**: `{refresh_token}`\n\n")
                  f.write(f"expires_in: {result.get('expires_in')}\n\n")
                  f.write(f"scope: {result.get('scope')}\n")
              else:
                  f.write("```json\n")
                  f.write(json.dumps(result, indent=2))
                  f.write("\n```\n")
          EOF
